<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#f5fbf9"><title>Manado</title><style>
:root{--green:#006b5a;--soft:#e9f7f3;--text:#071226;--muted:#536176;--shadow:0 18px 48px rgba(11,127,111,.13)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#eef8f6 0%,#f9fcfb 60%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}a{text-decoration:none;color:inherit}

.sticky-header h1{font-size:22px;margin:0;letter-spacing:-.04em}.sticky-header span{font-size:13px;color:var(--muted);font-weight:800}.round{width:40px;height:40px;border-radius:50%;background:#e4f5ef;color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:900}

.next-card img{width:132px;height:132px;object-fit:cover;border-radius:24px}.badge{display:inline-flex;background:#dff5ec;color:var(--green);padding:8px 15px;border-radius:999px;font-weight:900;font-size:15px;margin-bottom:10px}.next-card h2{margin:0 0 10px;font-size:34px;line-height:1;letter-spacing:-.04em}.next-card p{margin:0;color:#354258;line-height:1.45;font-size:15px}.go{width:44px;height:44px;border-radius:50%;background:#e5f5f1;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900}
.progress-wrap{margin:0 22px 26px;background:#fff;border-radius:22px;padding:15px 16px;box-shadow:0 10px 28px rgba(15,118,110,.08)}.progress-top{display:flex;justify-content:space-between;font-weight:900;color:#344155;font-size:13px;margin-bottom:9px}.progress-track{height:9px;background:#e5f3ef;border-radius:99px;overflow:hidden}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#006b5a,#12a58f);border-radius:99px;transition:width .3s}
.header{padding:14px 24px 4px}.header-row{display:flex;align-items:center;justify-content:space-between}.header h2{margin:0;font-size:31px;letter-spacing:-.04em}.header-row a{color:var(--green);font-weight:900;font-size:18px}
.timeline{position:relative;padding:0 22px 16px 46px}.timeline::before{content:"";position:absolute;left:25px;top:14px;bottom:18px;width:3px;background:var(--green);border-radius:99px}
.route-card{position:relative;display:grid;grid-template-columns:124px 1fr 22px;gap:16px;align-items:center;background:#fff;border-radius:26px;padding:14px;margin:14px 0;box-shadow:0 14px 34px rgba(15,118,110,.09);min-height:142px}.timeline-dot{position:absolute;left:-39px;top:50%;transform:translateY(-50%);width:43px;height:43px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;box-shadow:0 8px 20px rgba(0,107,90,.25)}
.route-card.is-past{opacity:.68}.route-card.is-past .timeline-dot{font-size:0;background:#16a673}.route-card.is-past .timeline-dot:after{content:"✓";font-size:18px}.route-card.is-current{outline:3px solid rgba(0,107,90,.18)}.route-card.is-current .timeline-dot{background:#ffb020;color:#071226}
.photo-wrap{width:124px;height:104px;border-radius:20px;overflow:hidden;background:#e5eee9}.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}.meta{color:#536176;font-size:15px;margin-bottom:11px}.route-copy h3{margin:0 0 8px;font-size:25px;letter-spacing:-.035em}.route-copy p{margin:0;color:#536176;font-size:16px;line-height:1.35}.chevron{color:var(--green);font-size:34px;font-weight:900}
.detail-photo{height:300px;background-size:cover;background-position:center;color:white;padding:18px;display:flex;flex-direction:column;justify-content:space-between;position:relative}.detail-photo:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.68))}.detail-photo>*{position:relative}.detail-photo h2{font-size:39px;line-height:1;margin:0;letter-spacing:-.04em}.back-pill{align-self:flex-start;background:rgba(0,0,0,.32);color:white;padding:10px 14px;border-radius:999px;font-weight:900;backdrop-filter:blur(10px)}
.card{background:#fff;border-radius:24px;padding:18px;margin:16px 22px;box-shadow:var(--shadow)}.card h3{margin:0 0 8px;color:var(--green);font-size:22px}.card p{color:#39465a;line-height:1.55;font-size:16px}.detail-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.detail-nav a{background:var(--green);color:white;text-align:center;padding:13px;border-radius:16px;font-weight:900}
nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.96);border-top:1px solid rgba(0,0,0,.06);backdrop-filter:blur(18px);padding:10px 8px 18px;z-index:20}nav a{text-align:center;color:#445066;font-weight:800;font-size:23px}nav a.active{color:var(--green)}nav span{display:block;font-size:11px;margin-top:3px}
@media(max-width:390px){.next-card{grid-template-columns:112px 1fr 38px;gap:13px;margin-left:16px;margin-right:16px}.next-card img{width:112px;height:112px}.next-card h2{font-size:28px}.timeline{padding-left:42px;padding-right:16px}.route-card{grid-template-columns:102px 1fr 18px;gap:13px}.photo-wrap{width:102px;height:92px}.route-copy h3{font-size:21px}.route-copy p{font-size:14px}.timeline-dot{left:-35px}}
</style></head><body><div class="app"><header class="sticky-header"><div><h1>Indonesië 2026</h1><span>Paul & Stephanie</span></div><div class="round">ID</div></header><section class="detail-photo" style="background-image:url('https://source.unsplash.com/900x700/?manado+indonesia+city+sea')"><a class="back-pill" href="index.html">← Route</a><div><div class="meta">🏙️ 28–29 aug · Noord-Sulawesi</div><h2>Manado</h2></div></section><section class="card"><h3>Waarom hierheen?</h3><p>Douchen, spullen drogen, seafood eten en rustig voorbereiden op de terugreis.</p><p><b>Verblijf:</b> Swiss Belhotel Maleosan Manado</p><div class="detail-nav"><a href="tangkoko.html">‹ Vorige</a><a href="terugreis.html">Volgende ›</a></div></section><nav><a class="active" href="index.html">🏠<span>Home</span></a><a href="index.html#route">🗺️<span>Route</span></a><a href="bunaken.html">🤿<span>Duiken</span></a><a href="tangkoko.html">🐾<span>Wildlife</span></a><a href="amsterdam-jakarta.html">•••<span>Meer</span></a></nav></div>
<script>
(function(){
 const cards=[...document.querySelectorAll('.route-card')];
 const stops=cards.map((el,i)=>({el,index:i+1,start:new Date(el.dataset.start+'T00:00:00'),end:new Date(el.dataset.end+'T23:59:59'),title:el.querySelector('h3').textContent,img:el.querySelector('img').src,href:el.href,meta:el.querySelector('.meta').textContent}));
 const today=new Date(); const d=new Date(today.getFullYear(),today.getMonth(),today.getDate());
 let current=stops.find(s=>d>=s.start&&d<=s.end); let next=stops.find(s=>d<s.start); let selected=current||next||stops[0];
 stops.forEach(s=>{if(d>s.end)s.el.classList.add('is-past'); if(current&&s.index===current.index)s.el.classList.add('is-current');});
 if(selected){document.getElementById('next-img').src=selected.img;document.getElementById('next-title').textContent=selected.title;document.getElementById('next-link').href=selected.href;document.getElementById('next-sub').textContent=selected.meta.replace(/^\S+\s*/,'📍 ');document.getElementById('next-badge').textContent=current?'Vandaag / huidige stop':'Volgende stop';}
 const start=stops[0].start,end=stops[stops.length-1].end,total=end-start,done=Math.min(Math.max(d-start,0),total); const pct=Math.round(done/total*100);
 document.getElementById('bar').style.width=pct+'%'; document.getElementById('pct').textContent=pct+'%';
 if(d<start){let days=Math.ceil((start-d)/86400000);document.getElementById('progress-label').textContent='Nog '+days+' dagen tot vertrek';}
 else if(d>end){document.getElementById('progress-label').textContent='Reis afgerond';}
 else{document.getElementById('progress-label').textContent='Reisvoortgang';}
})();
</script>
</body></html>
