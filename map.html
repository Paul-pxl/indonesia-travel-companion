<style>

:root{--green:#005a45;--green2:#007a61;--mint:#e7f5ef;--text:#071226;--muted:#566278;--shadow:0 18px 50px rgba(0,90,69,.13)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#edf7f3;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}a{text-decoration:none;color:inherit}
.app{max-width:430px;margin:0 auto;background:#f9fcfb;min-height:100vh;padding-bottom:92px;box-shadow:0 0 0 1px rgba(0,0,0,.04)}
.sticky{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#004832,#006b50);color:white;padding:20px 22px 18px;border-radius:0 0 0 0;box-shadow:0 8px 26px rgba(0,72,50,.22)}
.sticky-top{display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.brand-icon{font-size:31px}.brand h1{font-size:28px;letter-spacing:.02em;margin:0;text-transform:uppercase}.menu{font-size:34px;font-weight:900}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}.tabs a{padding:11px 4px 14px;text-align:center;color:rgba(255,255,255,.86);font-size:13px;font-weight:800;border-bottom:4px solid transparent}.tabs a.active{color:white;border-bottom-color:white}
.hero-card{margin:20px 24px 22px;border-radius:26px;overflow:hidden;min-height:306px;background-size:cover;background-position:center;box-shadow:var(--shadow);position:relative;color:white}.hero-card:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.25),rgba(0,0,0,.12))}.hero-inner{position:relative;padding:22px;height:100%;min-height:306px;display:flex;flex-direction:column;justify-content:space-between}.pill{align-self:flex-start;background:rgba(0,108,84,.92);padding:9px 14px;border-radius:999px;font-size:13px;text-transform:uppercase;font-weight:900;letter-spacing:.04em}.hero-card h2{font-size:44px;letter-spacing:-.05em;line-height:1;margin:0 0 18px}.hero-details{display:grid;gap:10px;font-size:17px;font-weight:650}.hero-go{position:absolute;right:22px;bottom:38px;width:58px;height:58px;border-radius:50%;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:42px}
.progress{background:white;margin:0 24px 28px;border-radius:22px;padding:18px;box-shadow:var(--shadow)}.progress h3{margin:0 0 16px;font-size:19px}.progress-row{display:flex;justify-content:space-between;color:#465168;font-size:14px;margin-bottom:9px}.track{height:10px;background:#e4ebe8;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#006b50,#0da77f);border-radius:99px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:26px 24px 14px}.section-head h2{font-size:28px;letter-spacing:-.04em;margin:0}.section-head a{color:var(--green);font-weight:900}
.timeline{position:relative;margin:0 24px 20px;padding-left:38px}.timeline:before{content:"";position:absolute;left:15px;top:10px;bottom:20px;width:3px;background:var(--green);border-radius:99px}
.stop{position:relative;display:grid;grid-template-columns:132px 1fr 20px;gap:14px;background:white;border-radius:23px;padding:12px;margin:14px 0;min-height:148px;box-shadow:0 14px 35px rgba(0,90,69,.10)}.num{position:absolute;left:-39px;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}.stop img{width:132px;height:120px;object-fit:cover;border-radius:18px}.stop small{display:block;color:#5d687c;font-size:14px;margin-bottom:8px}.stop h3{font-size:23px;letter-spacing:-.04em;margin:0 0 6px}.stop p{margin:0;color:#536176;font-size:15px;line-height:1.35}.arr{color:var(--green);font-size:32px;font-weight:900;align-self:center}.status{display:inline-block;background:#dff5ec;color:var(--green);font-weight:900;padding:3px 8px;border-radius:8px;margin-left:6px;font-size:12px}
.stop.is-past{opacity:.68}.stop.is-past .num{font-size:0;background:#16a673}.stop.is-past .num:after{content:"✓";font-size:20px}.stop.is-current{outline:3px solid rgba(0,90,69,.18)}
.detail-hero{height:330px;background-size:cover;background-position:center;position:relative;color:white;padding:20px;display:flex;flex-direction:column;justify-content:space-between}.detail-hero:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.68))}.detail-hero>*{position:relative}.back{align-self:flex-start;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:10px 14px;font-weight:900}.detail-hero h2{font-size:42px;line-height:1;letter-spacing:-.05em;margin:0}.detail-hero p{font-weight:800;margin:8px 0 0}.card{background:white;border-radius:24px;margin:18px 22px;padding:18px;box-shadow:var(--shadow)}.card h3{margin:0 0 10px;color:var(--green);font-size:22px}.card p{color:#3e4a5d;line-height:1.55}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{background:#f1faf6;border-radius:16px;padding:13px;color:var(--green);font-weight:900}.nav2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.nav2 a{background:var(--green);color:white;padding:14px;text-align:center;border-radius:16px;font-weight:900}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-top:1px solid rgba(0,0,0,.06);display:grid;grid-template-columns:repeat(5,1fr);padding:10px 8px 18px;z-index:60}.bottom a{text-align:center;color:#445066;font-size:22px;font-weight:900}.bottom span{display:block;font-size:11px;margin-top:3px}.bottom .active{color:var(--green)}
@media(max-width:390px){.brand h1{font-size:23px}.tabs a{font-size:12px}.hero-card{margin-left:16px;margin-right:16px}.hero-card h2{font-size:38px}.timeline{margin-left:18px;margin-right:16px;padding-left:34px}.stop{grid-template-columns:110px 1fr 16px}.stop img{width:110px;height:105px}.stop h3{font-size:20px}.stop p{font-size:14px}.num{left:-35px}.progress{margin-left:16px;margin-right:16px}}


.map-page{background:linear-gradient(180deg,#eef8f6,#f8fcfb);min-height:100vh;padding-bottom:106px}
.map-header{padding:22px 22px 14px}
.map-header h2{font-size:36px;letter-spacing:-.055em;line-height:1;margin:0 0 8px;color:#071226}
.map-header p{margin:0;color:#536176;line-height:1.45}
.premium-map{margin:0 14px;border-radius:34px;height:610px;overflow:hidden;position:relative;background:linear-gradient(180deg,#dcefeb 0%,#ecf7f4 55%,#dcefeb 100%);box-shadow:0 26px 70px rgba(0,90,69,.18);border:1px solid rgba(0,90,69,.09)}
.ocean-label{position:absolute;color:rgba(0,90,69,.28);font-weight:900;letter-spacing:.18em;font-size:11px;text-transform:uppercase}
.ocean-label.one{left:24px;top:105px}.ocean-label.two{right:28px;top:210px}
.map-svg{position:absolute;inset:0;width:100%;height:100%}
.land{fill:#f6f0df;stroke:rgba(0,90,69,.16);stroke-width:1.2;filter:drop-shadow(0 10px 16px rgba(0,90,69,.10))}
.land-shadow{fill:#d9eadb;opacity:.45}
.route-glow{fill:none;stroke:rgba(255,255,255,.9);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 10px rgba(0,90,69,.35))}
.route-line{fill:none;stroke:#006b50;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.flight-arc{fill:none;stroke:#e9b949;stroke-width:2.2;stroke-dasharray:5 7;stroke-linecap:round;opacity:.9}
.plane-icon{position:absolute;left:53%;top:49%;transform:rotate(32deg);font-size:24px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.18))}
.pin{position:absolute;transform:translate(-50%,-50%);width:29px;height:29px;border-radius:50%;border:2.5px solid white;background:#ffffff;color:#005a45;display:flex;align-items:center;justify-content:center;font-weight:950;box-shadow:0 7px 18px rgba(0,90,69,.20);cursor:pointer;transition:transform .22s ease, background .22s ease, color .22s ease}
.pin span{font-size:13px}
.pin.active{background:#e9b949;color:#071226;transform:translate(-50%,-50%) scale(1.28);z-index:10;box-shadow:0 0 0 8px rgba(233,185,73,.24),0 14px 28px rgba(0,0,0,.18)}
.pin.past{background:#006b50;color:#fff}
.info-card{position:absolute;left:14px;right:14px;bottom:14px;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border-radius:28px;padding:14px;box-shadow:0 20px 55px rgba(0,0,0,.18);display:grid;grid-template-columns:90px 1fr;gap:14px;align-items:center}
.info-card img{width:90px;height:90px;border-radius:21px;object-fit:cover;background:#e6f2ee}
.info-card small{font-size:13px;color:#536176;font-weight:900}
.info-card h3{font-size:27px;margin:4px 0 5px;letter-spacing:-.045em;line-height:1.02;color:#071226}
.info-card p{margin:0 0 10px;color:#536176;line-height:1.35}
.info-card a{display:inline-block;background:#005a45;color:white;padding:10px 13px;border-radius:14px;font-weight:900}
.map-controls{display:flex;gap:10px;overflow-x:auto;padding:16px 14px 4px;scrollbar-width:none}
.map-controls button{white-space:nowrap;border:0;background:white;color:#005a45;border-radius:999px;padding:10px 14px;font-weight:900;box-shadow:0 8px 18px rgba(0,90,69,.09)}
.map-controls button.active{background:#005a45;color:white}
.route-list{padding:12px 18px 0;display:grid;gap:10px}
.route-row{border:0;background:white;border-radius:20px;padding:10px;display:grid;grid-template-columns:56px 1fr;gap:12px;text-align:left;align-items:center;box-shadow:0 10px 24px rgba(0,90,69,.08)}
.route-row img{width:56px;height:56px;border-radius:15px;object-fit:cover;background:#eef5f2}
.route-row b{display:block;font-size:16px;color:#071226}
.route-row span{display:block;margin-top:3px;color:#536176;font-size:13px}
@media(max-width:390px){.premium-map{height:570px}.info-card{grid-template-columns:76px 1fr}.info-card img{width:76px;height:76px}.info-card h3{font-size:23px}.pin{width:27px;height:27px}}

</style>

const pins = [...document.querySelectorAll('.pin')];
const rows = [...document.querySelectorAll('.route-row')];
const controls = [...document.querySelectorAll('.map-controls button')];

function selectStop(i){
  const s = stops[i];
  pins.forEach(p=>p.classList.remove('active'));
  rows.forEach(r=>r.style.outline='none');
  pins[i]?.classList.add('active');
  if(rows[i]) rows[i].style.outline='3px solid rgba(0,90,69,.16)';
  document.getElementById('card-img').src = s.img || '';
  document.getElementById('card-meta').textContent = `Stop ${i+1} · ${s.date} · ${s.region}`;
  document.getElementById('card-title').textContent = s.emoji + ' ' + s.title;
  document.getElementById('card-desc').textContent = s.desc;
  document.getElementById('card-link').href = s.slug + '.html';
}

function filterRegion(region){
  controls.forEach(b=>b.classList.toggle('active', b.dataset.filter === region));
  stops.forEach((s,i)=>{
    const show = region === 'all' || s.region === region;
    pins[i].style.display = show ? 'flex' : 'none';
    rows[i].style.display = show ? 'grid' : 'none';
  });
}

pins.forEach(p=>p.addEventListener('click',()=>selectStop(Number(p.dataset.i))));
