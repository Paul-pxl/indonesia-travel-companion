<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>html,body,#map{height:100%;margin:0}#map{height:100vh}.panel{position:absolute;z-index:999;background:#fff;padding:12px;border-radius:12px;left:10px;top:10px;max-height:85vh;overflow:auto;box-shadow:0 4px 20px #0003}.panel a{display:block;margin:6px 0;color:#065;text-decoration:none;font-weight:bold}</style>
</head><body>
<div class="panel"><h3>Route Indonesië</h3><div id=list></div></div><div id=map></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const pts=[
{n:"Amsterdam",c:[52.3676,4.9041],u:"index.html"},
{n:"Jakarta",c:[-6.2088,106.8456],u:"jakarta.html"},
{n:"Bukit Lawang",c:[3.541,98.114],u:"bukit-lawang.html"},
{n:"Berastagi",c:[3.194,98.504],u:"berastagi.html"},
{n:"Ketambe",c:[3.684,97.658],u:"ketambe.html"},
{n:"Lake Toba",c:[2.66,98.86],u:"lake-toba.html"},
{n:"Sipirok",c:[1.638,99.272],u:"sipirok.html"},
{n:"Bukittinggi",c:[-0.305,100.369],u:"bukittinggi.html"},
{n:"Harau Valley",c:[-0.106,100.667],u:"harau-valley.html"},
{n:"Kerinci",c:[-1.697,101.264],u:"kerinci.html"},
{n:"Rammang Rammang",c:[-4.93,119.62],u:"rammang-rammang.html"},
{n:"Tana Toraja",c:[-3.075,119.821],u:"tana-toraja.html"},
{n:"Danau Poso",c:[-1.86,120.65],u:"danau-poso.html"},
{n:"Togian",c:[-0.4,121.9],u:"togian.html"},
{n:"Gorontalo",c:[0.5435,123.056],u:"gorontalo.html"},
{n:"Tomohon",c:[1.329,124.839],u:"tomohon.html"},
{n:"Bunaken",c:[1.62,124.76],u:"bunaken.html"},
{n:"Lembeh",c:[1.47,125.24],u:"lembeh.html"},
{n:"Tangkoko",c:[1.57,125.15],u:"tangkoko.html"},
{n:"Manado",c:[1.4748,124.8421],u:"manado.html"}
];
const map=L.map('map');
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);
const latlngs=[]; const b=document.getElementById('list');
pts.forEach((p,i)=>{
 latlngs.push(p.c);
 const m=L.marker(p.c).addTo(map).bindPopup(`<b>${i+1}. ${p.n}</b><br><a href='${p.u}'>Open bestemming</a>`);
 const a=document.createElement('a');a.href='#';a.textContent=(i+1)+'. '+p.n;
 a.onclick=(e)=>{e.preventDefault();map.flyTo(p.c,9);m.openPopup();};b.appendChild(a);
});
L.polyline(latlngs,{color:'#008060',weight:4}).addTo(map);
map.fitBounds(L.polyline(latlngs).getBounds(),{padding:[30,30]});
</script></body></html>
