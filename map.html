<script>
const DATA = {"stops": [{"n": 1, "date": "15–16 jul", "title": "Amsterdam → Jakarta", "region": "Transit", "type": "flight", "lat": 52.3676, "lng": 4.9041, "href": "amsterdam-jakarta.html", "photo": "photo-01.jpg", "desc": "Internationale heenreis via Mumbai naar Jakarta.", "tags": ["✈️ Vlucht", "Transit"]}, {"n": 2, "date": "16–17 jul", "title": "Jakarta", "region": "Transit", "type": "city", "lat": -6.2088, "lng": 106.8456, "href": "jakarta.html", "photo": "photo-01.jpg", "desc": "Transit en rust bij FM7 voor de start van Sumatra.", "tags": ["🏙️ Stad", "Hotel"]}, {"n": 3, "date": "17–18 jul", "title": "Bukit Lawang", "region": "Sumatra", "type": "wildlife", "lat": 3.549, "lng": 98.128, "href": "bukit-lawang.html", "photo": "photo-02.jpg", "desc": "Orang-oetans, rivier en eerste jungle-introductie.", "tags": ["🦧 Wildlife", "Jungle"]}, {"n": 4, "date": "19 jul", "title": "Berastagi", "region": "Sumatra", "type": "volcano", "lat": 3.1947, "lng": 98.5089, "href": "berastagi.html", "photo": "photo-03.jpg", "desc": "Koel hoogland, Karo-cultuur en vulkaanlandschap.", "tags": ["🌋 Vulkaan", "Hoogland"]}, {"n": 5, "date": "20–23 jul", "title": "Ketambe", "region": "Sumatra", "type": "wildlife", "lat": 3.6833, "lng": 97.65, "href": "ketambe.html", "photo": "photo-04.jpg", "desc": "Wildere Gunung Leuser-jungle en meerdaagse trek.", "tags": ["🌿 Jungle", "Wildlife"]}, {"n": 6, "date": "24–26 jul", "title": "Lake Toba", "region": "Sumatra", "type": "nature", "lat": 2.61, "lng": 98.86, "href": "lake-toba.html", "photo": "photo-05.jpg", "desc": "Rustblok aan het meer na de jungle.", "tags": ["💧 Meer", "Rust"]}, {"n": 7, "date": "27 jul", "title": "Sipirok", "region": "Sumatra", "type": "transit", "lat": 1.6, "lng": 99.2833, "href": "sipirok.html", "photo": "photo-06.jpg", "desc": "Strategische tussenstop richting West-Sumatra.", "tags": ["🚗 Overland", "Transit"]}, {"n": 8, "date": "28–30 jul", "title": "Bukittinggi", "region": "Sumatra", "type": "culture", "lat": -0.3056, "lng": 100.3692, "href": "bukittinggi.html", "photo": "photo-07.jpg", "desc": "Minangkabau-cultuur, Nasi Kapau en Sianok Canyon.", "tags": ["🏛️ Cultuur", "Eten"]}, {"n": 9, "date": "31 jul–1 aug", "title": "Harau Valley", "region": "Sumatra", "type": "nature", "lat": -0.1, "lng": 100.66, "href": "harau-valley.html", "photo": "photo-08.jpg", "desc": "Rijstvelden, kliffen, watervallen en vertraging.", "tags": ["⛰️ Kliffen", "Rust"]}, {"n": 10, "date": "2–4 aug", "title": "Kerinci", "region": "Sumatra", "type": "volcano", "lat": -1.697, "lng": 101.264, "href": "kerinci.html", "photo": "photo-09.jpg", "desc": "Theevelden en de zware vulkaan-hike.", "tags": ["🌋 Vulkaan", "Hike"]}, {"n": 11, "date": "5 aug", "title": "Jakarta", "region": "Transit", "type": "flight", "lat": -6.2088, "lng": 106.8456, "href": "jakarta.html", "photo": "photo-10.jpg", "desc": "Reset tussen Sumatra en Sulawesi.", "tags": ["✈️ Vlucht", "Transit"]}, {"n": 12, "date": "6 aug", "title": "Rammang Rammang", "region": "Sulawesi", "type": "nature", "lat": -4.9167, "lng": 119.6, "href": "rammang-rammang.html", "photo": "photo-11.jpg", "desc": "Karstlandschap, boottocht en rustige Sulawesi-start.", "tags": ["⛰️ Karst", "Boot"]}, {"n": 13, "date": "7–10 aug", "title": "Tana Toraja", "region": "Sulawesi", "type": "culture", "lat": -2.97, "lng": 119.9, "href": "tana-toraja.html", "photo": "photo-12.jpg", "desc": "Tongkonan, rotsgraven, ceremonies en rijstvelden.", "tags": ["🏛️ Cultuur", "Rijstvelden"]}, {"n": 14, "date": "11 aug", "title": "Danau Poso", "region": "Sulawesi", "type": "nature", "lat": -1.76, "lng": 120.65, "href": "danau-poso.html", "photo": "photo-13.jpg", "desc": "Rustige tussenstop richting Togians.", "tags": ["💧 Meer", "Transit"]}, {"n": 15, "date": "12–16 aug", "title": "Togian Islands", "region": "Sulawesi", "type": "dive", "lat": -0.35, "lng": 121.9, "href": "togian.html", "photo": "photo-14.jpg", "desc": "Eilandtijd, snorkelen en duiken.", "tags": ["🤿 Duiken", "Eiland"]}, {"n": 16, "date": "17 aug", "title": "Gorontalo", "region": "Sulawesi", "type": "transit", "lat": 0.5435, "lng": 123.0568, "href": "gorontalo.html", "photo": "photo-15.jpg", "desc": "Schakel tussen Togians en Noord-Sulawesi.", "tags": ["⛴️ Ferry", "Transit"]}, {"n": 17, "date": "18 aug", "title": "Tomohon", "region": "Sulawesi", "type": "volcano", "lat": 1.3244, "lng": 124.8385, "href": "tomohon.html", "photo": "photo-16.jpg", "desc": "Vulkanen, hoogland en laatste landblok.", "tags": ["🌋 Vulkaan", "Hike"]}, {"n": 18, "date": "19–23 aug", "title": "Bunaken", "region": "Sulawesi", "type": "dive", "lat": 1.623, "lng": 124.76, "href": "bunaken.html", "photo": "photo-17.jpg", "desc": "Wall dives, schildpadden en blauw water.", "tags": ["🤿 Duiken", "Schildpadden"]}, {"n": 19, "date": "24–25 aug", "title": "Lembeh", "region": "Sulawesi", "type": "dive", "lat": 1.46, "lng": 125.24, "href": "lembeh.html", "photo": "photo-18.jpg", "desc": "Macro en muck diving.", "tags": ["🤿 Macro", "Muck diving"]}, {"n": 20, "date": "26 aug", "title": "Tangkoko", "region": "Sulawesi", "type": "wildlife", "lat": 1.55, "lng": 125.16, "href": "tangkoko.html", "photo": "photo-19.jpg", "desc": "Zwarte makaken, tarsiers en wildlife-afsluiter.", "tags": ["🐾 Wildlife", "Tarsiers"]}, {"n": 21, "date": "27–29 aug", "title": "Manado", "region": "Sulawesi", "type": "city", "lat": 1.4748, "lng": 124.8421, "href": "manado.html", "photo": "photo-19.jpg", "desc": "Comfortabele eindbuffer en terugreisvoorbereiding.", "tags": ["🏙️ Stad", "Hotel"]}, {"n": 22, "date": "29–30 aug", "title": "Jakarta → Shanghai → Amsterdam", "region": "Terugreis", "type": "flight", "lat": 52.3676, "lng": 4.9041, "href": "terugreis.html", "photo": "photo-01.jpg", "desc": "Internationale terugreis via Jakarta en Shanghai.", "tags": ["✈️ Vlucht", "Terugreis"]}], "segments": [{"from": 1, "to": 2, "mode": "flight", "coords": [[52.3676, 4.9041], [-6.2088, 106.8456]]}, {"from": 2, "to": 3, "mode": "flight", "coords": [[-6.2088, 106.8456], [3.549, 98.128]]}, {"from": 3, "to": 4, "mode": "sumatra", "coords": [[3.549, 98.128], [3.1947, 98.5089]]}, {"from": 4, "to": 5, "mode": "sumatra", "coords": [[3.1947, 98.5089], [3.6833, 97.65]]}, {"from": 5, "to": 6, "mode": "sumatra", "coords": [[3.6833, 97.65], [2.61, 98.86]]}, {"from": 6, "to": 7, "mode": "sumatra", "coords": [[2.61, 98.86], [1.6, 99.2833]]}, {"from": 7, "to": 8, "mode": "sumatra", "coords": [[1.6, 99.2833], [-0.3056, 100.3692]]}, {"from": 8, "to": 9, "mode": "sumatra", "coords": [[-0.3056, 100.3692], [-0.1, 100.66]]}, {"from": 9, "to": 10, "mode": "sumatra", "coords": [[-0.1, 100.66], [-1.697, 101.264]]}, {"from": 10, "to": 11, "mode": "flight", "coords": [[-1.697, 101.264], [-6.2088, 106.8456]]}, {"from": 11, "to": 12, "mode": "flight", "coords": [[-6.2088, 106.8456], [-4.9167, 119.6]]}, {"from": 12, "to": 13, "mode": "sulawesi", "coords": [[-4.9167, 119.6], [-2.97, 119.9]]}, {"from": 13, "to": 14, "mode": "sulawesi", "coords": [[-2.97, 119.9], [-1.76, 120.65]]}, {"from": 14, "to": 15, "mode": "sulawesi", "coords": [[-1.76, 120.65], [-0.35, 121.9]]}, {"from": 15, "to": 16, "mode": "sulawesi", "coords": [[-0.35, 121.9], [0.5435, 123.0568]]}, {"from": 16, "to": 17, "mode": "sulawesi", "coords": [[0.5435, 123.0568], [1.3244, 124.8385]]}, {"from": 17, "to": 18, "mode": "sulawesi", "coords": [[1.3244, 124.8385], [1.623, 124.76]]}, {"from": 18, "to": 19, "mode": "sulawesi", "coords": [[1.623, 124.76], [1.46, 125.24]]}, {"from": 19, "to": 20, "mode": "sulawesi", "coords": [[1.46, 125.24], [1.55, 125.16]]}, {"from": 20, "to": 21, "mode": "sulawesi", "coords": [[1.55, 125.16], [1.4748, 124.8421]]}, {"from": 21, "to": 22, "mode": "flight", "coords": [[1.4748, 124.8421], [52.3676, 4.9041]]}]};
const iconEmoji = {wildlife:'🐾',volcano:'🌋',dive:'🤿',flight:'✈️',nature:'🌿',culture:'🏛️',transit:'🚗',city:'🏙️'};
const map = L.map('routeMap', {zoomControl:false, scrollWheelZoom:true}).setView([-2,112],5);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

const colors = {sumatra:'#0f8a5f', sulawesi:'#f97316', flight:'#2563eb', transfer:'#64748b'};
DATA.segments.forEach(seg => {
  L.polyline(seg.coords, {
    color: colors[seg.mode] || '#0f8a5f',
    weight: seg.mode==='flight'?3:5,
    opacity:.84,
    dashArray: seg.mode==='flight'?'8 10':null,
    smoothFactor:1
  }).addTo(map);
});
const markers = new Map();
function markerIcon(s){
  return L.divIcon({className:'', html:`<div class="marker-dot m-${s.type}">${iconEmoji[s.type]||s.n}</div>`, iconSize:[34,34], iconAnchor:[17,17]});
}
DATA.stops.forEach(s => {
  const popup = `<div class="popup-card"><img src="${s.photo}" onerror="this.style.display='none'"><b>${s.n}. ${s.title}</b><p><strong>${s.date}</strong> · ${s.region}</p><p>${s.desc}</p><div class="popup-tags">${s.tags.map(t=>`<span>${t}</span>`).join('')}</div><a href="${s.href}">Open bestemming</a></div>`;
  const m = L.marker([s.lat,s.lng], {icon:markerIcon(s), title:s.title}).bindPopup(popup).addTo(map);
  markers.set(s.n, m);
});
const bounds = L.latLngBounds(DATA.stops.map(s=>[s.lat,s.lng]));
map.fitBounds(bounds.pad(.18));

function activate(id, open=true){
  document.querySelectorAll('.route-card').forEach(c=>c.classList.toggle('active', +c.dataset.id===id));
  const s = DATA.stops.find(x=>x.n===id); if(!s) return;
  map.flyTo([s.lat,s.lng], Math.max(map.getZoom(), 7), {duration:.75});
  if(open) setTimeout(()=>markers.get(id).openPopup(), 520);
  document.getElementById('routeRange').value = id;
}
document.querySelectorAll('.route-card').forEach(btn=>btn.addEventListener('click',()=>activate(+btn.dataset.id)));
document.getElementById('routeRange').addEventListener('input',e=>activate(+e.target.value,false));
document.getElementById('fit').addEventListener('click',()=>map.fitBounds(bounds.pad(.18)));

let timer=null;
document.getElementById('play').addEventListener('click',e=>{
  if(timer){clearInterval(timer); timer=null; e.target.textContent='▶'; return;}
  e.target.textContent='Ⅱ';
  let i=+document.getElementById('routeRange').value;
  timer=setInterval(()=>{ activate(i,true); i++; if(i>22){clearInterval(timer);timer=null;e.target.textContent='▶';} }, 1250);
});

document.querySelectorAll('.map-controls button').forEach(btn=>btn.addEventListener('click',()=>{
  const f=btn.dataset.filter;
  document.querySelectorAll('.map-controls button').forEach(b=>b.classList.toggle('off', b!==btn && f!=='all'));
  markers.forEach((m,id)=>{
    const s=DATA.stops.find(x=>x.n===id);
    if(f==='all' || s.type===f){ if(!map.hasLayer(m)) m.addTo(map); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });
}));
</script>
</body></html>
